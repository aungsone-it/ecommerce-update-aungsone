<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SECURE.OS - Multi-tenant SaaS E-commerce Marketplace Platform" />
    <meta name="keywords" content="ecommerce, marketplace, vendor, admin, dashboard, myanmar" />
    <meta name="author" content="SECURE.OS" />
    <title>SECURE.OS - E-commerce Admin Dashboard</title>
  </head>
  <body>
    <!-- Runs before React/Vite — no env required. Fixes vendor subdomains when build env is missing. -->
    <script>
      (function () {
        var reserved = { www: 1, api: 1, admin: 1, app: 1, cdn: 1, mail: 1, ftp: 1, staging: 1, preview: 1 };
        var host = location.hostname.toLowerCase();
        var path = location.pathname || "/";
        var m = host.match(/^([a-z0-9-]+)\.walwal\.online$/);
        if (!m || reserved[m[1]]) return;
        if (path.indexOf("/store/") === 0) return;
        var sub = m[1];
        var map = (typeof window !== "undefined" && window.__VENDOR_SUBDOMAIN_SLUG_MAP__) || {};
        var storeSlug = map[sub] || sub;
        location.replace(location.origin + "/store/" + encodeURIComponent(storeSlug).replace(/%2F/g, "/") + (path === "/" || path === "" ? "" : path) + location.search + location.hash);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
